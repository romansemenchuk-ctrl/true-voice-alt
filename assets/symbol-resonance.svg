<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <defs>
    <radialGradient id="resCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF1B8" stop-opacity="0.95"></stop>
      <stop offset="40%" stop-color="#C9A227" stop-opacity="0.65"></stop>
      <stop offset="80%" stop-color="#C8102E" stop-opacity="0.25"></stop>
      <stop offset="100%" stop-color="#C8102E" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="resWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5F5F2" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#F5F5F2" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#F5F5F2" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="resWaveRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8102E" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#C8102E" stop-opacity="0.9"></stop>
      <stop offset="100%" stop-color="#C8102E" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="resBlur" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2"></feGaussianBlur>
    </filter>
  </defs>

  
  <ellipse cx="300" cy="100" rx="160" ry="80" fill="url(#resCore)" filter="url(#resBlur)"></ellipse>

  
  <path d="M0 100 Q 100 90, 200 100 T 400 100 T 600 100" stroke="#F5F5F2" stroke-opacity="0.12" stroke-width="0.6" fill="none"></path>
  
  <path d="M0 100 Q 75 76, 150 100 T 300 100 T 450 100 T 600 100" stroke="#F5F5F2" stroke-opacity="0.28" stroke-width="0.8" fill="none"></path>
  <path d="M0 100 Q 60 68, 120 100 T 240 100 T 360 100 T 480 100 T 600 100" stroke="url(#resWave)" stroke-opacity="0.65" stroke-width="1" fill="none"></path>
  
  <path d="M0 100 Q 50 50, 100 100 T 200 100 T 300 100 T 400 100 T 500 100 T 600 100" stroke="url(#resWave)" stroke-width="1.5" fill="none"></path>
  
  <path d="M0 100 Q 60 130, 120 100 T 240 100 T 360 100 T 480 100 T 600 100" stroke="url(#resWaveRed)" stroke-width="0.9" fill="none" opacity="0.85"></path>

  
  <path d="M0 100 Q 50 50, 100 100 T 200 100 T 300 100 T 400 100 T 500 100 T 600 100" stroke="#F5F5F2" stroke-opacity="0.18" stroke-width="4" fill="none" filter="url(#resBlur)"></path>

  
  <g fill="#C9A227">
    <circle cx="50" cy="100" r="1.4" opacity="0.5"></circle>
    <circle cx="150" cy="100" r="1.8" opacity="0.7"></circle>
    <circle cx="250" cy="100" r="2.2" opacity="0.85"></circle>
    <circle cx="350" cy="100" r="2.2" opacity="0.85"></circle>
    <circle cx="450" cy="100" r="1.8" opacity="0.7"></circle>
    <circle cx="550" cy="100" r="1.4" opacity="0.5"></circle>
  </g>

  
  <g>
    <circle cx="300" cy="100" r="56" stroke="#C8102E" stroke-opacity="0.18" stroke-width="0.5" fill="none"></circle>
    <circle cx="300" cy="100" r="40" stroke="#C8102E" stroke-opacity="0.35" stroke-width="0.6" fill="none"></circle>
    <circle cx="300" cy="100" r="24" stroke="#C9A227" stroke-opacity="0.65" stroke-width="0.7" fill="none"></circle>
    <circle cx="300" cy="100" r="12" stroke="#C8102E" stroke-width="1.1" fill="none"></circle>
    <circle cx="300" cy="100" r="5" fill="#C8102E"></circle>
    <circle cx="300" cy="100" r="1.6" fill="#FFF1B8"></circle>
  </g>

  
  <g stroke="#C9A227" stroke-opacity="0.7" stroke-width="0.7">
    <line x1="300" y1="34" x2="300" y2="46"></line>
    <line x1="300" y1="154" x2="300" y2="166"></line>
    <line x1="226" y1="100" x2="238" y2="100"></line>
    <line x1="362" y1="100" x2="374" y2="100"></line>
  </g>
</svg>