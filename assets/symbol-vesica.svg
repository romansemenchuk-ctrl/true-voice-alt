    <line x1="200" y1="14" x2="200" y2="20" transform="rotate(45 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="20" transform="rotate(75 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="20" transform="rotate(105 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="20" transform="rotate(135 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="20" transform="rotate(165 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="20" transform="rotate(195 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="20" transform="rotate(225 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="20" transform="rotate(255 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="20" transform="rotate(285 200 200)"></line>
