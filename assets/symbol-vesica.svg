  <path d="M 200 80 A 120 120 0 0 1 200 320 A 120 120 0 0 1 200 80 Z" fill="none" stroke="#F5F5F2" stroke-opacity="0.45" stroke-width="0.7"></path>

  
  <circle cx="200" cy="80" r="2.2" fill="#C9A227"></circle>
  <circle cx="200" cy="320" r="2.2" fill="#C9A227"></circle>

  
  <circle cx="140" cy="200" r="1.8" fill="#F5F5F2" fill-opacity="0.45"></circle>
  <circle cx="260" cy="200" r="1.8" fill="#F5F5F2" fill-opacity="0.45"></circle>

  
  <circle cx="200" cy="200" r="16" fill="none" stroke="#C8102E" stroke-opacity="0.45" stroke-width="0.5"></circle>
  <circle cx="200" cy="200" r="8" fill="url(#vesCore)"></circle>
  <circle cx="200" cy="200" r="2" fill="#0B0B0D"></circle>
