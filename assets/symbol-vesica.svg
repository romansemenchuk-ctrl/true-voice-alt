    <line x1="200" y1="14" x2="200" y2="24" transform="rotate(60 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="24" transform="rotate(90 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="24" transform="rotate(120 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="24" transform="rotate(150 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="24" transform="rotate(180 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="24" transform="rotate(210 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="24" transform="rotate(240 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="24" transform="rotate(270 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="24" transform="rotate(300 200 200)"></line>
    <line x1="200" y1="14" x2="200" y2="24" transform="rotate(330 200 200)"></line>
  </g>

  
  <g stroke="#C9A227" stroke-opacity="0.4" stroke-width="0.4">
