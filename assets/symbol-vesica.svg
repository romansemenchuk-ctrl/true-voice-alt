    <circle cx="320" cy="200" r="120"></circle>
  </g>

  
  <line x1="200" y1="40" x2="200" y2="360" stroke="#C9A227" stroke-opacity="0.45" stroke-width="0.6"></line>

  
  <g clip-path="url(#vesAlmondClip)">
    
    <polygon points="200,90 252,290 148,290" fill="none" stroke="#C9A227" stroke-opacity="0.5" stroke-width="0.5"></polygon>
    
    <polygon points="200,310 148,110 252,110" fill="none" stroke="#C8102E" stroke-opacity="0.55" stroke-width="0.5"></polygon>
    
    <circle cx="200" cy="200" r="46" fill="none" stroke="#C9A227" stroke-opacity="0.45" stroke-width="0.5"></circle>
    
    <line x1="148" y1="200" x2="252" y2="200" stroke="#F5F5F2" stroke-opacity="0.18" stroke-width="0.4"></line>
