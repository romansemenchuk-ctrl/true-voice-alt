<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <radialGradient id="vesAtmos" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#C9A227" stop-opacity="0.16"></stop>
      <stop offset="55%" stop-color="#C8102E" stop-opacity="0.1"></stop>
      <stop offset="100%" stop-color="#0B0B0D" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="vesAlmond" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF1B8" stop-opacity="0.55"></stop>
      <stop offset="55%" stop-color="#C9A227" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#C8102E" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="vesCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF1B8"></stop>
      <stop offset="40%" stop-color="#C9A227"></stop>
      <stop offset="100%" stop-color="#C8102E"></stop>
    </radialGradient>
    <filter id="vesBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"></feGaussianBlur>
    </filter>
    <clipPath id="vesAlmondClip">
      <path d="M 200 80 A 120 120 0 0 1 200 320 A 120 120 0 0 1 200 80 Z"></path>
    </clipPath>
  </defs>

  
  <circle cx="200" cy="200" r="200" fill="url(#vesAtmos)"></circle>

  
  <circle cx="200" cy="200" r="184" fill="none" stroke="#F5F5F2" stroke-opacity="0.08" stroke-width="0.5"></circle>
  <circle cx="200" cy="200" r="176" fill="none" stroke="#F5F5F2" stroke-opacity="0.04" stroke-width="0.4" stroke-dasharray="2 5"></circle>

  
  <g stroke="#F5F5F2" stroke-opacity="0.28" stroke-width="0.5">
