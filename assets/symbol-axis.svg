<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" fill="none">
  <defs>
    <linearGradient id="axisColumn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F2" stop-opacity="0"></stop>
      <stop offset="12%" stop-color="#C9A227" stop-opacity="0.55"></stop>
      <stop offset="35%" stop-color="#F5F5F2" stop-opacity="0.85"></stop>
      <stop offset="50%" stop-color="#C8102E" stop-opacity="0.95"></stop>
      <stop offset="65%" stop-color="#F5F5F2" stop-opacity="0.85"></stop>
      <stop offset="88%" stop-color="#C9A227" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#F5F5F2" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="axisHaze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8102E" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#C8102E" stop-opacity="0.3"></stop>
      <stop offset="100%" stop-color="#C8102E" stop-opacity="0"></stop>
    </linearGradient>
    <radialGradient id="axisHeart" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF1B8" stop-opacity="0.9"></stop>
      <stop offset="35%" stop-color="#C9A227" stop-opacity="0.75"></stop>
      <stop offset="75%" stop-color="#C8102E" stop-opacity="0.4"></stop>
      <stop offset="100%" stop-color="#C8102E" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="axisBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"></feGaussianBlur>
    </filter>
  </defs>

  
  <rect x="50" y="0" width="100" height="400" fill="url(#axisHaze)" filter="url(#axisBlur)" opacity="0.7"></rect>

  
  <circle cx="100" cy="200" r="80" fill="url(#axisHeart)"></circle>

  
  <g stroke="#F5F5F2" stroke-opacity="0.12" stroke-width="0.4">
