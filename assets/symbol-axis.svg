  <g stroke="#F5F5F2" stroke-opacity="0.25" stroke-width="0.5" fill="none">
    <path d="M100 40 Q 130 100 100 140 Q 70 180 100 200 Q 130 240 100 260 Q 70 320 100 360"></path>
