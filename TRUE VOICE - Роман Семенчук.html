<meta name="description" content="7-денний онлайн-курс Романа Семенчука. Соматичний підхід до голосу: дихання, тіло, звук. 7 практик через Telegram-бот. Старт завтра. 14 днів гарантії повернення."/>

<link rel="preload" href="fonts/stratosweb-bold-TRIAL.woff" as="font" type="font/woff" crossorigin/>
<link rel="preload" href="fonts/stratosweb-semibold-TRIAL.woff" as="font" type="font/woff" crossorigin/>

<style>
  html, body { background: #08080A; }
  #root { min-height: 100svh; }
  /* boot splash — hidden once mounted */
  .tv-boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0B0B0D;
    z-index: 200; pointer-events: none;
    transition: opacity 600ms ease-out;
  }
  .tv-boot.gone { opacity: 0; }
  .tv-boot .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #C8102E; box-shadow: 0 0 16px rgba(200,16,46,0.6);
    animation: tvPulse 1.4s ease-in-out infinite;
  }
  @keyframes tvPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div class="tv-boot" id="tv-boot"><span class="dot"></span></div>

<div id="root"></div>

<!-- defs first, then app -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="breath.jsx"></script>
<script type="text/babel" src="voice-wall.jsx"></script>
<script type="text/babel" src="voice-ambient.jsx"></script>
<script type="text/babel" src="sections-a.jsx"></script>
<script type="text/babel" src="sections-b.jsx"></script>
<script type="text/babel" src="sections-c.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script>
  window.addEventListener('load', () => {
    setTimeout(() => {
      const b = document.getElementById('tv-boot');
      if (b) {
        b.classList.add('gone');
        setTimeout(() => b.remove(), 700);
      }
    }, 320);
  });
</script>

</body>
</html>
